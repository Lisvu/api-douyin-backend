# Server Configuration
server.port=8080
server.servlet.context-path=

# Database Configuration (PostgreSQL database on the same server)
spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/api
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=api_app
spring.datasource.password=ApiApp_6M9pK2vQ8zR4tX7n

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console disabled because the application uses PostgreSQL
spring.h2.console.enabled=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Custom JWT Secret and expiration (24 hours)
jwt.secret=9a4f2c8d3b7a1e5f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8a9b0c1d
jwt.expiration=86400000

# Cache Configuration (Caffeine local in-memory cache)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s
