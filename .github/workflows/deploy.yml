name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            sudo -u lihao bash -lc '
              set -e
              cd /home/lihao/api-douyin-backend
              git fetch origin main
              git reset --hard origin/main
              mvn -q -DskipTests compile
            '

            old_pids=$(pgrep -u lihao -f "com.douyin.api.ApiDouyinApplication" || true)
            if [ -n "$old_pids" ]; then
              kill $old_pids || true
            fi

            for i in $(seq 1 20); do
              if ss -ltn | grep -q ':8080 '; then
                sleep 1
              else
                break
              fi
            done

            if ss -ltn | grep -q ':8080 '; then
              fuser -k 8080/tcp || true
              sleep 2
            fi

            sudo -u lihao bash -lc '
              cd /home/lihao/api-douyin-backend
              nohup mvn spring-boot:run -q -Dspring-boot.run.profiles=server > /home/lihao/backend.log 2>&1 < /dev/null &
            '

            for i in $(seq 1 30); do
              if ss -ltn | grep -q ':8080 '; then
                exit 0
              fi
              sleep 1
            done

            echo "Backend did not start on port 8080" >&2
            tail -n 80 /home/lihao/backend.log >&2
            exit 1
